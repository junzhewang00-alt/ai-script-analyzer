{% extends "base.html" %}
{% block content %}
<div class="hero">
    <h1>剧本智能分析</h1>
    <p>粘贴或上传你的剧本文本，AI 将从人物、结构、对白、主题、图片提示词、视频提示词7个维度进行专业分析。</p>
    <div class="hero-links">
        <a href="/prompts" class="hero-link-btn">🎨 提示词工作室</a>
    </div>
</div>

{% if error %}
<div class="alert alert-error">{{ error }}</div>
{% endif %}

<div class="card">
    <form action="/analyze" method="POST" enctype="multipart/form-data" id="analyze-form">
        <div class="form-group">
            <div class="form-label-row">
                <label for="script_text">粘贴剧本文本</label>
                <button type="button" class="btn-link" id="example-btn">📋 试用示例剧本</button>
            </div>
            <textarea
                id="script_text"
                name="script_text"
                rows="15"
                placeholder="在此粘贴剧本内容...&#10;&#10;支持纯文本格式，最大30000字符。"
            ></textarea>
            <div class="char-count">
                <span id="char-count">0</span> / 30000 字符
                <span id="over-limit-warn" style="display:none">⚠️ 超出限制，超出的部分会被截断</span>
            </div>
        </div>

        <div class="divider"><span>或者</span></div>

        <div class="form-group">
            <label for="script_file">上传剧本文件</label>
            <div class="file-upload" id="file-upload">
                <input type="file" id="script_file" name="script_file" accept=".txt,.pdf,.fdx,.docx">
                <div class="file-upload-label">
                    <span class="file-icon">📁</span>
                    <span>点击选择文件或拖拽到此处</span>
                    <span class="file-hint">支持 .txt / .pdf / .fdx / .docx</span>
                </div>
                <div class="file-name" id="file-name"></div>
            </div>
        </div>

        <button type="submit" class="btn btn-primary" id="submit-btn">
            <span class="btn-text">开始分析</span>
            <span class="btn-loader" style="display:none">分析中...</span>
        </button>
    </form>
</div>
{% endblock %}
