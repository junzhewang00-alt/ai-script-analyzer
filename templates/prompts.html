{% extends "base.html" %}
{% block content %}
<div class="ps-studio" id="ps-studio">
    <!-- 左侧：文本框区域 -->
    <div class="ps-main">
        <div class="ps-header">
            <a href="/" class="btn btn-outline">← 返回首页</a>
            <h2 class="ps-title">🎨 提示词工作室</h2>
            <button class="btn btn-primary ps-toggle-btn" id="ps-toggle-btn" onclick="togglePanel(event)">
                📖 提示词速查
            </button>
        </div>

        <div class="ps-boxes">
            <div class="ps-box-group">
                <div class="ps-box-header">
                    <label>🇨🇳 中文提示词</label>
                    <button class="btn-copy-sm" onclick="copyBox('ps-zh')">📋 复制</button>
                </div>
                <textarea id="ps-zh" class="ps-textarea" rows="5" placeholder="从右侧速查手册点击标签来添加提示词，或直接输入中文..."></textarea>
                <div class="ps-tags" id="ps-tags-zh"></div>
            </div>

            <div class="ps-arrow">⬇️ 翻译 ⬇️</div>

            <div class="ps-box-group">
                <div class="ps-box-header">
                    <label>🇺🇸 English Prompt <span style="font-size:0.75rem;color:var(--text-muted);font-weight:400;">（适配nanobanana）</span></label>
                    <button class="btn-copy-sm" onclick="copyBox('ps-en')">📋 复制</button>
                </div>
                <textarea id="ps-en" class="ps-textarea" rows="5" placeholder="English translation will appear here..."></textarea>
                <div class="ps-tags" id="ps-tags-en"></div>
            </div>
        </div>

        <div class="ps-actions">
            <button class="btn btn-primary" id="btn-ps-translate" onclick="translatePsPrompt()">🌐 翻译中文 → 英文</button>
            <button class="btn btn-outline" onclick="clearPsBuilder()">🗑 清空全部</button>
        </div>
    </div>

    <!-- 右侧：提示词速查面板（叠加层，不阻挡操作） -->
    <div class="ps-panel-overlay" id="ps-panel-overlay"></div>
    <div class="ps-panel" id="ps-panel">
        <div class="ps-panel-header">
            <span class="ps-panel-title">📖 提示词速查手册</span>
            <button class="ps-panel-close" onclick="closePanel()">&times;</button>
        </div>
        <div class="ps-panel-search">
            <input type="text" id="ps-search" placeholder="🔍 搜索提示词..." oninput="filterPrompts()">
        </div>
        <div class="ps-panel-cats" id="ps-panel-cats"></div>
        <div class="ps-panel-tags" id="ps-panel-tags"></div>
    </div>
</div>

// ============================================================
// BUILD CATEGORY TABS & TAG PANELS
// ============================================================
var activeCat = PS_CATEGORIES[0].id;
var addedTags = {};

// Cached DOM refs — set once in DOMContentLoaded
var elZh, elEn, elTagsZh, elTagsEn, elPanel, elOverlay, elPanelCats, elPanelTags;

function getTagParts() {
    var zhParts = [], enParts = [];
    Object.keys(addedTags).forEach(function(zh) {
        zhParts.push(zh);
        enParts.push(addedTags[zh].en);
    });
    return { zhParts: zhParts, enParts: enParts };
}

function getCustomPrefix() {
    var val = elZh.value;
    var tagStr = getTagParts().zhParts.join(", ");
    if (!tagStr) return val;
    if (val.endsWith(", " + tagStr)) return val.slice(0, -(2 + tagStr.length));
    return val;
}

function createChip(text, color, key) {
    var chip = document.createElement("span");
    chip.className = "ps-added-tag";
    chip.textContent = text;
    chip.style.background = color + "22";
    chip.style.borderColor = color;
    chip.style.color = color;
    chip.title = "点击移除";
    chip.onclick = function() { removeTag(key); };
    return chip;
}

function buildPanel() {
    elPanelCats.innerHTML = "";
    elPanelTags.innerHTML = "";

    PS_CATEGORIES.forEach(function(cat, ci) {
        var btn = document.createElement("button");
        btn.className = "ps-cat-btn" + (ci === 0 ? " active" : "");
        btn.textContent = cat.icon + " " + cat.name;
        btn.dataset.catId = cat.id;
        btn.style.setProperty("--cat-color", cat.color);
        btn.onclick = function() { switchCat(cat.id); };
        elPanelCats.appendChild(btn);

        var panel = document.createElement("div");
        panel.className = "ps-cat-panel" + (ci === 0 ? " active" : "");
        panel.id = "ps-cat-panel-" + cat.id;
        cat.tags.forEach(function(t) {
            var tag = document.createElement("span");
            tag.className = "ps-tag";
            tag.textContent = t.zh;
            tag.title = t.en;
            tag.style.setProperty("--tag-color", cat.color);
            tag.onclick = function() { addTag(t.zh, t.en, cat.color); };
            panel.appendChild(tag);
        });
        elPanelTags.appendChild(panel);
    });
}

function switchCat(catId) {
    activeCat = catId;
    document.querySelectorAll(".ps-cat-btn").forEach(function(b) { b.classList.remove("active"); });
    document.querySelectorAll(".ps-cat-panel").forEach(function(p) { p.classList.remove("active"); });
    document.getElementById("ps-cat-panel-" + catId).classList.add("active");
    var activeBtn = document.querySelector(".ps-cat-btn[data-cat-id='" + catId + "']");
    if (activeBtn) activeBtn.classList.add("active");
}

function addTag(zh, en, color) {
    if (addedTags[zh]) return;
    addedTags[zh] = {zh: zh, en: en, color: color};
    elTagsZh.appendChild(createChip(zh, color, zh));
    elTagsEn.appendChild(createChip(en, color, zh));
    rebuildText();
}

function removeTag(zh) {
    delete addedTags[zh];
    refreshTags();
}

function refreshTags() {
    elTagsZh.innerHTML = "";
    elTagsEn.innerHTML = "";
    Object.keys(addedTags).forEach(function(zh) {
        var t = addedTags[zh];
        elTagsZh.appendChild(createChip(zh, t.color, zh));
        elTagsEn.appendChild(createChip(t.en, t.color, zh));
    });
    rebuildText();
}

function rebuildText() {
    var parts = getTagParts();
    var prefix = getCustomPrefix();
    var tagStr = parts.zhParts.join(", ");

    if (prefix && tagStr) {
        elZh.value = prefix + ", " + tagStr;
    } else if (prefix) {
        elZh.value = prefix;
    } else {
        elZh.value = tagStr;
    }
    elEn.value = parts.enParts.join(", ");
}

function togglePanel(e) {
    if (e) e.stopPropagation();
    var isOpen = elPanel.classList.contains("open");
    if (isOpen) {
        elPanel.classList.remove("open");
        elOverlay.classList.remove("open");
    } else {
        elPanel.classList.add("open");
        elOverlay.classList.add("open");
    }
}

function closePanel() {
    elPanel.classList.remove("open");
    elOverlay.classList.remove("open");
}

document.addEventListener("DOMContentLoaded", function() {
    elZh = document.getElementById("ps-zh");
    elEn = document.getElementById("ps-en");
    elTagsZh = document.getElementById("ps-tags-zh");
    elTagsEn = document.getElementById("ps-tags-en");
    elPanel = document.getElementById("ps-panel");
    elOverlay = document.getElementById("ps-panel-overlay");
    elPanelCats = document.getElementById("ps-panel-cats");
    elPanelTags = document.getElementById("ps-panel-tags");

    buildPanel();

    if (elZh) {
        elZh.addEventListener("input", function() {
            var tagStr = getTagParts().zhParts.join(", ");
            if (!tagStr) return;
            if (!elZh.value.endsWith(", " + tagStr)) {
                addedTags = {};
                elTagsZh.innerHTML = "";
                elTagsEn.innerHTML = "";
            }
        });
    }

    document.querySelector(".ps-main").addEventListener("click", function(e) {
        if (!elPanel.classList.contains("open")) return;
        if (e.target.closest("#ps-toggle-btn") || e.target.closest("#ps-panel")) return;
        closePanel();
    });
});

// SEARCH
// ============================================================
function filterPrompts() {
    var q = (document.getElementById("ps-search").value || "").toLowerCase();
    var panels = document.querySelectorAll(".ps-cat-panel");
    panels.forEach(function(panel) {
        var tags = panel.querySelectorAll(".ps-tag");
        var hasMatch = false;
        tags.forEach(function(tag) {
            var text = (tag.textContent + " " + tag.title).toLowerCase();
            if (!q || text.indexOf(q) !== -1) {
                tag.style.display = "";
                hasMatch = true;
            } else {
                tag.style.display = "none";
            }
        });
        // Show/hide the cat button
        var catId = panel.id.replace("ps-cat-panel-", "");
        var buttons = document.querySelectorAll(".ps-cat-btn");
        PS_CATEGORIES.forEach(function(c, i) {
            if (c.id === catId && buttons[i]) {
                buttons[i].style.display = hasMatch || !q ? "" : "none";
            }
        });
    });
}

// ============================================================
// TEXT BOX OPERATIONS
// ============================================================
function copyBox(boxId) {
    var box = document.getElementById(boxId);
    if (!box || !box.value.trim()) return;
    if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(box.value).then(function() {
            var btn = document.querySelector("#" + boxId).closest(".ps-box-group").querySelector(".btn-copy-sm");
            if (btn) { var orig = btn.textContent; btn.textContent = "✓"; setTimeout(function() { btn.textContent = orig; }, 1200); }
        });
    } else {
        box.select();
        document.execCommand("copy");
    }
}

function clearPsBuilder() {
    addedTags = {};
    elZh.value = "";
    elEn.value = "";
    elTagsZh.innerHTML = "";
    elTagsEn.innerHTML = "";
}

function translatePsPrompt() {
    var zhBox = document.getElementById("ps-zh");
    var enBox = document.getElementById("ps-en");
    var btn = document.getElementById("btn-ps-translate");
    var text = zhBox.value.trim();
    if (!text) return;

    btn.disabled = true;
    btn.textContent = "⏳ 翻译中...";

    fetch("/api/translate", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({text: text})
    })
    .then(function(r) { return r.json(); })
    .then(function(data) {
        btn.disabled = false;
        btn.textContent = "🌐 翻译中文 → 英文";
        if (data.translated && enBox) {
            enBox.value = data.translated;
        } else if (data.error) {
            alert("翻译失败: " + data.error);
        }
    })
    .catch(function() {
        btn.disabled = false;
        btn.textContent = "🌐 翻译中文 → 英文";
        alert("翻译请求失败，请检查网络连接");
    });
}
</script>
{% endblock %}
